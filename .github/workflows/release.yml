name: release-win-x64

on:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: release-main
  cancel-in-progress: false

env:
  PROJECT_PATH: AzrngTools/AzrngTools.csproj
  PUBLISH_DIR: artifacts/publish/win-x64
  PACKAGE_DIR: artifacts/package
  PACKAGE_NAME: AzrngTools-win-x64-portable.zip

jobs:
  publish-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Resolve release metadata
        id: meta
        shell: pwsh
        run: |
          [xml]$project = Get-Content "${{ env.PROJECT_PATH }}"
          $projectVersion = ($project.Project.PropertyGroup | Where-Object { $_.Version } | Select-Object -First 1).Version

          if ([string]::IsNullOrWhiteSpace($projectVersion)) {
            throw "未在项目文件中找到 Version。"
          }

          $beforeSha = "${{ github.event.before }}"
          $zeroSha = "0000000000000000000000000000000000000000"
          $previousVersion = ""

          if ($beforeSha -and $beforeSha -ne $zeroSha) {
            git cat-file -e "${beforeSha}:${{ env.PROJECT_PATH }}" 2>$null
            if ($LASTEXITCODE -eq 0) {
              [xml]$previousProject = git show "${beforeSha}:${{ env.PROJECT_PATH }}"
              $previousVersion = ($previousProject.Project.PropertyGroup | Where-Object { $_.Version } | Select-Object -First 1).Version
            }
          }

          $versionChanged = $projectVersion -ne $previousVersion
          $tagName = "v$projectVersion"
          git fetch origin --tags --force

          $tagSha = ""
          git rev-parse -q --verify "refs/tags/$tagName" *> $null
          if ($LASTEXITCODE -eq 0) {
            $tagSha = (git rev-list -n 1 $tagName).Trim()
          }

          $createTagNeeded = $false
          $releaseNeeded = $false

          if ($versionChanged) {
            if ($tagSha -and $tagSha -ne "${{ github.sha }}") {
              throw "版本 $projectVersion 对应的 tag 已存在，但不指向当前 main 提交，请先提升 Version。"
            }

            $createTagNeeded = -not $tagSha
            $releaseNeeded = $true
          }

          $packagePath = Join-Path "${{ github.workspace }}" "${{ env.PACKAGE_DIR }}\\${{ env.PACKAGE_NAME }}"

          "project_version=$projectVersion" >> $env:GITHUB_OUTPUT
          "previous_version=$previousVersion" >> $env:GITHUB_OUTPUT
          "tag_name=$tagName" >> $env:GITHUB_OUTPUT
          "version_changed=$($versionChanged.ToString().ToLowerInvariant())" >> $env:GITHUB_OUTPUT
          "create_tag_needed=$($createTagNeeded.ToString().ToLowerInvariant())" >> $env:GITHUB_OUTPUT
          "release_needed=$($releaseNeeded.ToString().ToLowerInvariant())" >> $env:GITHUB_OUTPUT
          "package_path=$packagePath" >> $env:GITHUB_OUTPUT

      - name: Skip when version is unchanged
        if: steps.meta.outputs.release_needed != 'true'
        shell: pwsh
        run: |
          Write-Host "Version 未变化，跳过自动打 tag 与发布。当前版本: ${{ steps.meta.outputs.project_version }}"

      - name: Create and push version tag
        if: steps.meta.outputs.create_tag_needed == 'true'
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.meta.outputs.tag_name }}" "${{ github.sha }}"
          git push origin "${{ steps.meta.outputs.tag_name }}"

      - name: Restore
        if: steps.meta.outputs.release_needed == 'true'
        run: dotnet restore ${{ env.PROJECT_PATH }}

      - name: Publish win-x64 package
        if: steps.meta.outputs.release_needed == 'true'
        shell: pwsh
        run: |
          dotnet publish "${{ env.PROJECT_PATH }}" `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -o "${{ env.PUBLISH_DIR }}"

      - name: Compress portable package
        if: steps.meta.outputs.release_needed == 'true'
        shell: pwsh
        run: |
          $publishDir = Join-Path "${{ github.workspace }}" "${{ env.PUBLISH_DIR }}"
          $packagePath = "${{ steps.meta.outputs.package_path }}"
          $packageDirectory = Split-Path -Parent $packagePath

          if (-not (Test-Path $packageDirectory)) {
            New-Item -ItemType Directory -Path $packageDirectory | Out-Null
          }

          if (Test-Path $packagePath) {
            Remove-Item $packagePath -Force
          }

          Compress-Archive -Path (Join-Path $publishDir '*') -DestinationPath $packagePath -Force

      - name: Upload workflow artifact
        if: steps.meta.outputs.release_needed == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: AzrngTools-win-x64-portable
          path: ${{ steps.meta.outputs.package_path }}

      - name: Publish GitHub release
        if: steps.meta.outputs.release_needed == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag_name }}
          target_commitish: ${{ github.sha }}
          name: AzrngTools ${{ steps.meta.outputs.project_version }}
          generate_release_notes: true
          files: ${{ steps.meta.outputs.package_path }}
