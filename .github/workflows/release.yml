name: release-win-x64

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-main
  cancel-in-progress: false

env:
  VERSION_FILE: VERSION
  PROJECT_PATH: AzrngTools/AzrngTools.csproj
  PUBLISH_DIR: publish/win-x64
  PACKAGE_NAME: AzrngTools-win-x64-portable.zip

jobs:
  publish-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Resolve release metadata
        id: release_meta
        shell: pwsh
        run: |
          $versionFilePath = Join-Path "${{ github.workspace }}" "${{ env.VERSION_FILE }}"
          $legacyVersion = ""
          if (Test-Path -LiteralPath $versionFilePath) {
            $legacyVersion = (Get-Content -LiteralPath $versionFilePath -Raw -Encoding UTF8).Trim()
          }

          if ($legacyVersion -match '^\d+\.\d+\.\d+(?:\.\d+)?$') {
            $version = $legacyVersion
          }
          else {
            $version = (Get-Date).ToUniversalTime().ToString("yyyy.M.d.HH")
          }

          $timestamp = Get-Date -Format "yyyyMMdd-HHmmss"
          $shortSha = "${{ github.sha }}".Substring(0, 7)
          $tag = "v$version-build-$timestamp-$shortSha"
          $releaseName = "AzrngTools $version ($timestamp)"
          $packagePath = Join-Path "${{ github.workspace }}" "${{ env.PACKAGE_NAME }}"

          "version=$version" >> $env:GITHUB_OUTPUT
          "tag_name=$tag" >> $env:GITHUB_OUTPUT
          "release_name=$releaseName" >> $env:GITHUB_OUTPUT
          "package_path=$packagePath" >> $env:GITHUB_OUTPUT

      - name: Restore
        run: dotnet restore ${{ env.PROJECT_PATH }}

      - name: Publish win-x64 package
        shell: pwsh
        run: |
          $version = "${{ steps.release_meta.outputs.version }}"
          $informationalVersion = $version
          
          if (Test-Path "${{ env.PUBLISH_DIR }}") {
            Remove-Item "${{ env.PUBLISH_DIR }}" -Recurse -Force
          }

          dotnet publish "${{ env.PROJECT_PATH }}" `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -o "${{ env.PUBLISH_DIR }}" `
            -p:AzrngToolsVersionDate=$version `
            -p:PublishAot=false `
            -p:PublishTrimmed=false `
            -p:DebugType=None `
            -p:DebugSymbols=false `
            -p:InformationalVersion=$informationalVersion `
            -p:Version=$version

      - name: Create ZIP package
        shell: pwsh
        run: |
          $packagePath = "${{ steps.release_meta.outputs.package_path }}"
          $symbolFiles = Get-ChildItem -Path "${{ env.PUBLISH_DIR }}" -Filter *.pdb -File -Recurse

          if ($symbolFiles.Count -gt 0) {
            Write-Host "清理 $($symbolFiles.Count) 个 .pdb 文件。"
            foreach ($symbolFile in $symbolFiles) {
              Remove-Item -LiteralPath $symbolFile.FullName -Force
            }
          }

          $remainingSymbolFiles = Get-ChildItem -Path "${{ env.PUBLISH_DIR }}" -Filter *.pdb -File -Recurse
          if ($remainingSymbolFiles.Count -gt 0) {
            throw "仍存在未清理的 .pdb 文件，打包终止。"
          }

          if (Test-Path $packagePath) {
            Remove-Item $packagePath -Force
          }

          Compress-Archive -Path "${{ env.PUBLISH_DIR }}/*" -DestinationPath $packagePath -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: AzrngTools-win-x64-portable
          path: ${{ steps.release_meta.outputs.package_path }}
          retention-days: 30

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_meta.outputs.tag_name }}
          name: ${{ steps.release_meta.outputs.release_name }}
          target_commitish: ${{ github.sha }}
          files: ${{ steps.release_meta.outputs.package_path }}
          draft: false
          prerelease: false
          generate_release_notes: true
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
